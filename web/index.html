<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeAll</title>

    <!--
      DEV CSP (Vite):
      - Vite dev injects inline preamble + uses eval in some tooling paths.
      - This meta is ONLY for local dev. For production, set CSP via headers and remove this.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com;
        frame-src https://challenges.cloudflare.com;
        connect-src 'self' http://127.0.0.1:8000 https://api.weallprotocol.xyz https://weall-email-oracle.errol1swaby2.worker.dev https://challenges.clouflare.com;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob:;
        font-src 'self' data:;
        connect-src 'self' https: http: ws: wss:;
      "
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
