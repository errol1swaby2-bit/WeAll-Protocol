services:
  weall-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: weall-node
    restart: unless-stopped

    expose:
      - "8000"

    ports:
      - "30303:30303"

    environment:
      WEALL_MODE: "prod"
      WEALL_UNSAFE_DEV: "0"
      WEALL_ALLOW_UNSIGNED_TXS: "0"

      WEALL_NET_ENABLED: "1"
      WEALL_BFT_ENABLED: "1"
      # Full production posture: TLS transport by default.
      WEALL_NET_TRANSPORT: "tls"
      WEALL_NET_BIND_HOST: "0.0.0.0"
      WEALL_NET_BIND_PORT: "30303"

      WEALL_NET_TLS_CERT: "/run/secrets/weall_net_tls_cert"
      WEALL_NET_TLS_KEY: "/run/secrets/weall_net_tls_key"
      WEALL_NET_TLS_CA: "/run/secrets/weall_net_tls_ca"
      WEALL_NET_TLS_SERVER_NAME: "${WEALL_NET_TLS_SERVER_NAME:-}"

      WEALL_PEERS: "${WEALL_PEERS:-}"

      WEALL_PEERS_FILE: "./data/peers.txt"
      WEALL_PEERS_PERSIST: "1"
      WEALL_PEERS_MAX: "1000"
      WEALL_PEERS_PRUNE_INTERVAL_MS: "30000"

      WEALL_VALIDATOR_ACCOUNT_FILE: "/run/secrets/weall_validator_account"
      WEALL_NODE_PUBKEY_FILE: "/run/secrets/weall_node_pubkey"
      WEALL_NODE_PRIVKEY_FILE: "/run/secrets/weall_node_privkey"

      WEALL_SQLITE_SYNCHRONOUS: "FULL"
      WEALL_ENABLE_PUBLIC_DEBUG: "0"
      WEALL_MAX_REQUEST_BYTES: "1000000"

      # If you enable this, keep it *tight*; these are safe defaults for docker-private networks.
      WEALL_TRUST_PROXY_HEADERS: "1"
      WEALL_TRUSTED_PROXY_IPS: "172.16.0.0/12,10.0.0.0/8,192.168.0.0/16"

      WEALL_IPFS_ENABLED: "1"
      WEALL_IPFS_API_BASE: "http://kubo:5001"
      WEALL_IPFS_GATEWAY_BASE: "http://kubo:8080"
      WEALL_IPFS_MAX_UPLOAD_BYTES: "10485760"

    secrets:
      - weall_node_privkey
      - weall_node_pubkey
      - weall_validator_account
      - weall_net_tls_cert
      - weall_net_tls_key
      - weall_net_tls_ca

    volumes:
      - weall_data:/app/data

    read_only: true
    tmpfs:
      - /tmp

    networks:
      - weall_net

    depends_on:
      - kubo

    command: ["sh", "-c", "/app/scripts/run_node.sh"]

  kubo:
    image: ipfs/kubo:v0.26.0
    container_name: weall-kubo
    restart: unless-stopped
    environment:
      IPFS_LOGGING: "info"
    volumes:
      - ipfs_staging:/export
      - ipfs_data:/data/ipfs
    expose:
      - "5001"
      - "8080"
    networks:
      - weall_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: weall-cloudflared
    restart: unless-stopped

    environment:
      CLOUDFLARE_TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN:-}"

    command: >
      sh -c '
        if [ -n "$${CLOUDFLARE_TUNNEL_TOKEN}" ]; then
          exec cloudflared tunnel --no-autoupdate --metrics 0.0.0.0:2000 run --token "$${CLOUDFLARE_TUNNEL_TOKEN}";
        else
          exec cloudflared tunnel --no-autoupdate --metrics 0.0.0.0:2000 run --config /etc/cloudflared/config.yml;
        fi
      '

    # Internal-only readiness/metrics port (no need to publish to host)
    expose:
      - "2000"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2000/ready | grep -q OK"]
      interval: 5s
      timeout: 2s
      retries: 30
      start_period: 5s

    volumes:
      - ./cloudflared:/etc/cloudflared:ro

    networks:
      - weall_net

    depends_on:
      - weall-node

networks:
  weall_net:
    driver: bridge

volumes:
  weall_data:
  ipfs_data:
  ipfs_staging:

secrets:
  weall_node_privkey:
    file: ./secrets/weall_node_privkey
  weall_node_pubkey:
    file: ./secrets/weall_node_pubkey
  weall_validator_account:
    file: ./secrets/weall_validator_account
  weall_net_tls_cert:
    file: ./secrets/weall_net_tls_cert.pem
  weall_net_tls_key:
    file: ./secrets/weall_net_tls_key.pem
  weall_net_tls_ca:
    file: ./secrets/weall_net_tls_ca.pem
