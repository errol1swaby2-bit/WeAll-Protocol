services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    profiles: ["oracle", "mail"]
    restart: unless-stopped
    init: true
    volumes:
      - stalwart_data:/opt/stalwart
    ports:
      - "25:25"
      - "587:587"
      - "993:993"
    networks:
      - weall_oracle

  weall-poh-email-oracle:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ALLOW_UNLOCKED: "1"
    profiles: ["oracle"]
    restart: unless-stopped
    init: true
    depends_on:
      - stalwart
    environment:
      WEALL_MODE: ${WEALL_MODE:-dev}
      WEALL_CHAIN_ID: ${WEALL_CHAIN_ID:-weall-dev}
      WEALL_EMAIL_TRANSPORT: ${WEALL_EMAIL_TRANSPORT:-stalwart_smtp}
      WEALL_SMTP_HOST: ${WEALL_SMTP_HOST:-stalwart}
      WEALL_SMTP_PORT: ${WEALL_SMTP_PORT:-587}
      WEALL_SMTP_USERNAME: ${WEALL_SMTP_USERNAME:-verify@poh.weall.example}
      WEALL_SMTP_FROM: ${WEALL_SMTP_FROM:-verify@poh.weall.example}
      WEALL_EMAIL_ORACLE_ID: ${WEALL_EMAIL_ORACLE_ID:-oracle:poh-email:dev-1}
      WEALL_EMAIL_ORACLE_PUBLIC_KEY: ${WEALL_EMAIL_ORACLE_PUBLIC_KEY:-}
      WEALL_EMAIL_ORACLE_PUBLIC_KEY_ID: ${WEALL_EMAIL_ORACLE_PUBLIC_KEY_ID:-oracle-email-dev-1}
      WEALL_NODE_RPC_URL: ${WEALL_NODE_RPC_URL:-http://weall_api:8000}
      WEALL_POH_EMAIL_CHALLENGE_STORE: /data/poh_email_challenges.json
      WEALL_POH_EMAIL_CHALLENGE_DB: /data/poh_email_challenges.sqlite3
      WEALL_MOCK_EMAIL_OUTBOX: /data/poh_email_outbox.jsonl
      PYTHONPATH: /app/src
    env_file:
      - .env.oracle
    volumes:
      - poh_email_oracle_data:/data
    ports:
      - "8091:8091"
    command: ["python", "-m", "weall.oracle_service"]
    networks:
      - weall_oracle

volumes:
  stalwart_data:
  poh_email_oracle_data:

networks:
  weall_oracle:
    name: weall_oracle
