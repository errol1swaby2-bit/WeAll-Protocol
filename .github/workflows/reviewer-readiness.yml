name: Reviewer Readiness Gate

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: reviewer-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reviewer-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend locked dependencies
        working-directory: Weall-Protocol
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run reviewer readiness gate
        working-directory: Weall-Protocol
        run: bash scripts/reviewer_production_readiness_gate.sh
