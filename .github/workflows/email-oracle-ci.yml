name: PoH Email Oracle CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: poh-email-oracle-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  poh_email_oracle:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Weall-Protocol

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            Weall-Protocol/requirements.in
            Weall-Protocol/requirements-dev.in
            Weall-Protocol/pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Typecheck compile targets
        run: |
          python -m py_compile \
            src/weall/poh/email_verification.py \
            src/weall/oracle_service/config.py \
            src/weall/oracle_service/__main__.py \
            src/weall/api/routes_public_parts/poh.py

      - name: Test Cloudflare-free PoH email oracle path
        run: |
          pytest \
            tests/test_cloudflare_free_email_transport_batch250.py \
            tests/test_email_control_attestation_v1_batch250.py \
            tests/test_poh_email_attestation_submit_batch250.py \
            tests/test_email_verification_oracle_auth.py \
            tests/test_api_contracts_web_and_email_oracle.py
