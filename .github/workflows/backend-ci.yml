name: Backend CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Weall-Protocol

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify locked backend install path
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv-lock-check
          . .venv-lock-check/bin/activate
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.lock
          pip install -e . --no-deps
          python - <<'PY'
          import fastapi  # noqa: F401
          import httpx  # noqa: F401
          import pytest  # noqa: F401
          import weall  # noqa: F401
          PY
          deactivate
          rm -rf .venv-lock-check

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.lock
          pip install -e . --no-deps

      - name: Ruff changed Python files
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            RANGE="${PR_BASE_SHA}...HEAD"
          elif [[ -n "${PUSH_BEFORE_SHA:-}" && "${PUSH_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            RANGE="${PUSH_BEFORE_SHA}..HEAD"
          else
            RANGE="HEAD^..HEAD"
          fi

          mapfile -t PY_FILES < <(
            git -C .. diff --name-only --diff-filter=ACMR "${RANGE}" \
              | awk '/^Weall-Protocol\/.*\.py$/ {sub(/^Weall-Protocol\//, ""); print}'
          )

          if (( ${#PY_FILES[@]} == 0 )); then
            echo "No changed Python files to check."
            exit 0
          fi

          printf 'Checking %s\n' "${PY_FILES[@]}"
          ruff format --check "${PY_FILES[@]}"
          ruff check "${PY_FILES[@]}"

      - name: Dependency audit
        run: |
          # Audit the reproducible dependency graphs rather than the mutable
          # runner environment or the local editable package.
          pip-audit -r requirements.lock
          pip-audit -r requirements-dev.lock

      - name: Canon lint
        run: |
          python -m tooling.canon_lint

      - name: Check generated artifacts
        run: |
          python scripts/check_generated.py
          PYTHONPATH=src python scripts/compile_v2_spec.py --check
          python scripts/check_v2_spec_clean_checkout.py

      - name: Generate Tx coverage report
        run: |
          python scripts/generate_tx_coverage_report.py

      - name: Upload Tx coverage report
        uses: actions/upload-artifact@v4
        with:
          name: tx-coverage-report
          path: Weall-Protocol/generated/tx_coverage_report.md

      - name: Pytest
        run: |
          pytest -q
