name: Backend CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Weall-Protocol

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify locked backend install path
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv-lock-check
          . .venv-lock-check/bin/activate
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-dev.lock
          pip install -e . --no-deps
          python - <<'PY'
          import fastapi  # noqa: F401
          import httpx  # noqa: F401
          import pytest  # noqa: F401
          import weall  # noqa: F401
          PY
          deactivate
          rm -rf .venv-lock-check

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          # The locked install path is verified above. This install keeps CI tooling
          # such as ruff and pip-audit available until they are added to the lock.
          pip install -e ".[test,ci]"

      - name: Ruff
        run: |
          ruff format --check .
          ruff check .

      - name: Dependency audit
        run: |
          # pip-audit will scan installed deps. If lockfiles exist, also audit against them.
          pip-audit
          if [ -f requirements.lock ]; then pip-audit -r requirements.lock; fi

      - name: Canon lint
        run: |
          python -m tooling.canon_lint

      - name: Check generated artifacts
        run: |
          python scripts/check_generated.py
          PYTHONPATH=src python scripts/compile_v2_spec.py --check
          python scripts/check_v2_spec_clean_checkout.py

      - name: Generate Tx coverage report
        run: |
          python scripts/generate_tx_coverage_report.py

      - name: Upload Tx coverage report
        uses: actions/upload-artifact@v4
        with:
          name: tx-coverage-report
          path: Weall-Protocol/generated/tx_coverage_report.md

      - name: Pytest
        run: |
          pytest -q
