name: Web CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend runtime from lockfile
        working-directory: Weall-Protocol
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install -e . --no-deps

      - name: Start backend for contract check
        working-directory: Weall-Protocol
        run: |
          PYTHONPATH=src python -m uvicorn weall.api.app:app --host 127.0.0.1 --port 8000 > /tmp/weall-web-ci-backend.log 2>&1 &
          echo $! > /tmp/weall-web-ci-backend.pid
          for i in {1..30}; do
            if python - <<'PY'
          import urllib.request
          try:
              urllib.request.urlopen("http://127.0.0.1:8000/v1/readyz", timeout=1)
              raise SystemExit(0)
          except Exception:
              raise SystemExit(1)
          PY
            then
              echo "backend ready"
              exit 0
            fi
            sleep 1
          done
          echo "backend failed to become ready" >&2
          cat /tmp/weall-web-ci-backend.log >&2 || true
          exit 1

      - name: Install
        run: |
          npm ci

      - name: Typecheck
        run: |
          npm run typecheck

      - name: Contract check
        run: |
          API_BASE=http://127.0.0.1:8000 npm run contract-check

      - name: Build
        run: |
          npm run build
